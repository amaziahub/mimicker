repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^contrib/
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: poetry run python -m py_compile
        language: system
        types: [python]
        pass_filenames: true

      - id: tests
        name: tests
        entry: poetry run pytest -x -q --no-header
        language: system
        pass_filenames: false
        always_run: true
